<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enlarging Island</title>
<style>
body {
    margin:0;
    font-family:"JetBrains Mono", monospace;
    background:white;
    height:1300vh;
    overflow-x:hidden;
    transition: background 0.5s ease;
}

#island {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 100px;
    border-radius: 60px;
    background: #111;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    z-index: 100;
    padding:10px 20px;
    transform: translate(-50%, -50%) scale(1);
    transition: width 0.6s cubic-bezier(0.25,1,0.5,1), 
                height 0.6s cubic-bezier(0.25,1,0.5,1), 
                border-radius 0.6s cubic-bezier(0.25,1,0.5,1),
                transform 0.6s cubic-bezier(0.25,1,0.5,1);
}

.island-content {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
    transition: font-size 0.6s cubic-bezier(0.25,1,0.5,1);
}
</style>
</head>
<body>

<div id="island">
    <div class="island-content"></div>
</div>

<script>
const island = document.getElementById("island");
const content = island.querySelector(".island-content");
const threshold = 800;
const maxScroll = 2000;
const holdAfterExpand = 90;
const returnDuration = maxScroll - threshold;
const returnStart = maxScroll + holdAfterExpand;
const returnEnd = returnStart + returnDuration;
const bottomIslandCenterOffset = 70;

function lerp(a,b,t){return a+(b-a)*t;}
function cubicEase(t){return t*t*(3-2*t);}

window.addEventListener("scroll", ()=>{
    const scrollY = window.scrollY;
    const expandProgress = Math.min(Math.max((scrollY - threshold) / (maxScroll - threshold), 0), 1);
    const returnProgress = Math.min(Math.max((scrollY - returnStart) / (returnEnd - returnStart), 0), 1);

    const easedExpand = cubicEase(expandProgress);
    const easedReturn = cubicEase(returnProgress);
    const phase = easedExpand * (1 - easedReturn);

    const width = lerp(300, window.innerWidth, phase);
    const height = lerp(100, window.innerHeight, phase);
    const radius = lerp(60, 0, phase);
    const topPosition = lerp(window.innerHeight / 2, window.innerHeight - bottomIslandCenterOffset, easedReturn);

    island.style.width = width+"px";
    island.style.height = height+"px";
    island.style.borderRadius = radius+"px";
    island.style.top = topPosition + "px";
    island.style.transform = "translate(-50%, -50%) scale(1)";

    const fontSize = lerp(1,3,phase);
    content.style.fontSize = fontSize+"em";

    const bgVal = Math.floor(lerp(255,0,phase));
    document.body.style.background = `rgb(${bgVal},${bgVal},${bgVal})`;
});

document.addEventListener("mousemove", e=>{
    const scrollY = window.scrollY;
    if(scrollY < threshold){
        const mouseX = (e.clientX/window.innerWidth -0.5)*20;
        const mouseY = (e.clientY/window.innerHeight -0.5)*10;
        island.style.transform = `translate(calc(-50% + ${mouseX}px), calc(-50% + ${mouseY}px)) scale(1)`;
    }
});
</script>

</body>
</html>
